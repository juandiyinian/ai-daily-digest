<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily Digest</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; margin-bottom: 30px; color: #333; }
        .calendar-container { text-align: center; margin-bottom: 30px; }
        #date-picker { padding: 10px 15px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; width: 200px; }
        .reports-list { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .report-item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .report-item:last-child { border-bottom: none; }
        .report-item a { color: #0366d6; text-decoration: none; font-size: 16px; }
        .report-item a:hover { text-decoration: underline; }
        .report-date { color: #666; font-size: 14px; margin-left: 10px; }
        #report-content { background: white; border-radius: 8px; padding: 30px; margin-top: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); line-height: 1.8; }
        #report-content h2 { margin: 20px 0 10px 0; color: #24292e; }
        #report-content ul, #report-content ol { margin-left: 20px; margin-bottom: 15px; }
        #report-content li { margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>📰 AI Daily Digest</h1>
    <div class="calendar-container">
        <input type="text" id="date-picker" placeholder="选择日期查看日报">
    </div>
    <div class="reports-list">
        <h3 style="margin-bottom: 15px;">最近日报</h3>
        <div id="reports-list-content"></div>
    </div>
    <div id="report-content"></div>

    <script>
        // 初始化日历组件
        flatpickr("#date-picker", {
            dateFormat: "Y-m-d",
            maxDate: "today",
            onChange: function(selectedDates, dateStr) {
                loadReport(dateStr);
            }
        });

        // 加载日报列表
        async function loadReportsList() {
            const res = await fetch('https://api.github.com/repos/juandiyinian/ai-daily-digest/contents/docs/reports');
            const files = await res.json();
            const listEl = document.getElementById('reports-list-content');
            const reports = files
                .filter(f => f.name.endsWith('.md'))
                .sort((a,b) => b.name.localeCompare(a.name))
                .slice(0, 30);
            
            listEl.innerHTML = reports.map(f => {
                const date = f.name.replace('.md', '');
                return `<div class="report-item">
                    <a href="javascript:loadReport('${date}')">${date} 日报</a>
                    <span class="report-date">${new Date(date).toLocaleDateString('zh-CN', {weekday: 'long'})}</span>
                </div>`;
            }).join('');
        }

        // 加载指定日期的日报
        async function loadReport(date) {
            try {
                const res = await fetch(`reports/${date}.md`);
                const md = await res.text();
                document.getElementById('report-content').innerHTML = marked.parse(md);
                window.scrollTo({top: document.getElementById('report-content').offsetTop - 20, behavior: 'smooth'});
            } catch (e) {
                document.getElementById('report-content').innerHTML = `<p style="color: #999; text-align: center;">${date} 暂无日报</p>`;
            }
        }

        // 页面加载时加载列表
        loadReportsList();
    </script>
</body>
</html>
